name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide the information below.

  - type: input
    id: version
    attributes:
      label: DIM-Creator Version
      description: What version are you using?
      placeholder: "e.g., v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10
        - Windows 11
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: logs
    attributes:
      label: Log Files (Optional)
      description: Attach logs from `Documents/DIMCreator/Logs/`
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, archive formats, file sizes, etc.